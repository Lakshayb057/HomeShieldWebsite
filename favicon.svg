<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield background -->
  <path d="M50 10 L85 22 C85 58 50 86 50 86 C50 86 15 58 15 22 Z" fill="#0a1c3e"/>
  
  <!-- Outer Gold Stroke (Stylized open shield) -->
  <path d="M30 22 L50 12 L85 24 C85 58 50 86 50 86 C50 86 20 62 17 38" stroke="#e2a83a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 2x2 Grid Window under Roof -->
  <rect x="44" y="18" width="12" height="12" fill="none" stroke="#e2a83a" stroke-width="2"/>
  <line x1="50" y1="18" x2="50" y2="30" stroke="#e2a83a" stroke-width="1.5"/>
  <line x1="44" y1="24" x2="56" y2="24" stroke="#e2a83a" stroke-width="1.5"/>
  
  <!-- Typographic "Home Shield" with exact packaging letter colors -->
  <text x="50" y="49" font-family="'Outfit', sans-serif" font-weight="900" font-size="16" text-anchor="middle" letter-spacing="-0.5">
    <tspan fill="#ffffff">Hom</tspan><tspan fill="#e2a83a">e</tspan>
  </text>
  
  <text x="50" y="67" font-family="'Outfit', sans-serif" font-weight="900" font-size="17" text-anchor="middle" letter-spacing="-0.5">
    <tspan fill="#e2a83a">Shi</tspan><tspan fill="#ffffff">e</tspan><tspan fill="#e2a83a">ld</tspan>
  </text>

  <!-- Small Tagline at bottom of shield -->
  <text x="50" y="78" fill="#ffffff" font-family="'Outfit', sans-serif" font-weight="800" font-size="5" text-anchor="middle" letter-spacing="1">PREMIUM</text>
</svg>
